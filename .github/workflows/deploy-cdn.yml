name: Deploy CDN (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'data/json/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # nécessaire pour comparer avec le commit précédent

      - name: Deploy data/json/ to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./data/json
          keep_files: false
          commit_message: 'chore: update CDN catalog'

      - name: Detect new books and send notifications
        env:
          FCM_SERVICE_ACCOUNT_KEY: ${{ secrets.FCM_SERVICE_ACCOUNT_KEY }}
        run: |
          # Comparer catalog.json avec le commit précédent pour trouver les nouveaux livres
          PREV=$(git show HEAD~1:data/json/catalog.json 2>/dev/null || echo "[]")
          CURR=$(cat data/json/catalog.json)

          # IDs présents dans le nouveau catalog mais pas dans l'ancien
          NEW_IDS=$(node -e "
            const prev = $(echo "$PREV" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>console.log(JSON.stringify(JSON.parse(d).map(l=>l.id))))');
            const curr = $(echo "$CURR" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>console.log(JSON.stringify(JSON.parse(d).map(l=>l.id))))');
            const newIds = curr.filter(id => !prev.includes(id));
            console.log(newIds.join(' '));
          " 2>/dev/null || echo "")

          if [ -z "$NEW_IDS" ]; then
            echo "Aucun nouveau livre détecté, pas de notification à envoyer."
            exit 0
          fi

          npm ci --silent
          for ID in $NEW_IDS; do
            echo "📣 Envoi notification pour : $ID"
            node scripts/notify-new-book.js "$ID"
          done
