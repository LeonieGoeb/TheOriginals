name: Add Book Pipeline

on:
  push:
    paths:
      - '_source/pending/*.docx'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug du livre à traiter (ex: mon-livre)'
        required: true
      force:
        description: 'Force replace existing book (if already in app)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    # Timeout long pour les gros livres (6 heures max)
    timeout-minutes: 360

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Cache pour accélérer les relances ──────────────────────────────────
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Cache spaCy models
        uses: actions/cache@v4
        with:
          path: ~/.local/lib/python3.11/site-packages
          key: ${{ runner.os }}-spacy-models-v2

      - name: Cache pipeline progress
        uses: actions/cache@v4
        with:
          path: scripts/tmp
          key: pipeline-${{ steps.find-book.outputs.slug }}-${{ github.run_id }}
          restore-keys: |
            pipeline-${{ steps.find-book.outputs.slug }}-${{ github.sha }}-

      # ── Installation ───────────────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          pip install spacy
          python scripts/install-spacy-models.py

      # ── Détection du livre à traiter ───────────────────────────────────────
      - name: Find book to process
        id: find-book
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            FILENAME="${{ github.event.inputs.slug }}"
          else
            # Chercher un docx ajouté dans ce commit (--diff-filter=A = ajouts seulement)
            DOCX=$(git diff-tree --no-commit-id -r --name-only --diff-filter=A HEAD -- '_source/pending/*.docx' | head -1)
            # Fallback : prendre le premier docx présent dans le dossier pending
            if [ -z "$DOCX" ]; then
              DOCX=$(ls _source/pending/*.docx 2>/dev/null | head -1)
            fi
            FILENAME=$(basename "$DOCX" .docx)
          fi
          # Extraire la langue cible depuis le suffixe --<lang> (ex: my-book--de → de)
          # Le suffixe est normalisé en tiret simple dans le slug (my-book--de → my-book-de)
          # pour garantir l'unicité : my-book (fr) et my-book-de (de) coexistent sans conflit.
          if [[ "$FILENAME" =~ --([a-z]{2})$ ]]; then
            LANGUE_CIBLE="${BASH_REMATCH[1]}"
            BASE="${FILENAME%--${LANGUE_CIBLE}}"
            SLUG="${BASE}-${LANGUE_CIBLE}"
          else
            LANGUE_CIBLE="fr"
            SLUG="$FILENAME"
          fi
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "langue_cible=$LANGUE_CIBLE" >> $GITHUB_OUTPUT
          echo "📚 Livre : $SLUG  (→ $LANGUE_CIBLE)"

      # ── Pipeline ───────────────────────────────────────────────────────────
      - name: Step 1 - Extract chapters from docx (mammoth)
        run: node scripts/1-extract.js "${{ steps.find-book.outputs.slug }}"

      - name: Step 2 - Generate config JSON via Mistral
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: node scripts/2-config.js "${{ steps.find-book.outputs.slug }}" "${{ steps.find-book.outputs.langue_cible }}"

      - name: Step 1b - Semantic segmentation via Mistral
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          LANGUE_SOURCE=$(node -e "const c=require('./_source/pending/${{ steps.find-book.outputs.slug }}.json'); console.log(c.langueSource)")
          node scripts/1b-segment.js "${{ steps.find-book.outputs.slug }}" "$LANGUE_SOURCE"

      - name: Step 3 - Translate (with auto-retry on rate limits)
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          LANGUE_SOURCE=$(node -e "const c=require('./_source/pending/${{ steps.find-book.outputs.slug }}.json'); console.log(c.langueSource)")
          LANGUE_CIBLE=$(node -e "const c=require('./_source/pending/${{ steps.find-book.outputs.slug }}.json'); console.log(c.langueCible)")
          node scripts/3-translate.js \
            "${{ steps.find-book.outputs.slug }}" \
            "$LANGUE_SOURCE" \
            "$LANGUE_CIBLE"

      - name: Step 4 - Grammatical annotation
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          LANGUE_SOURCE=$(node -e "const c=require('./_source/pending/${{ steps.find-book.outputs.slug }}.json'); console.log(c.langueSource)")
          LANGUE_CIBLE=$(node -e "const c=require('./_source/pending/${{ steps.find-book.outputs.slug }}.json'); console.log(c.langueCible)")
          python scripts/4-annotate.py \
            "${{ steps.find-book.outputs.slug }}" \
            "$LANGUE_SOURCE" \
            "$LANGUE_CIBLE"

      - name: Step 5 - Generate TypeScript files
        run: |
          node scripts/5-generate.js \
            "_source/pending/${{ steps.find-book.outputs.slug }}.json"

      # ── Déplacer les fichiers dans processed/ ──────────────────────────────
      - name: Move files to processed
        run: |
          mkdir -p _source/processed
          mv "_source/pending/${{ steps.find-book.outputs.slug }}.docx" _source/processed/
          mv "_source/pending/${{ steps.find-book.outputs.slug }}.json" _source/processed/

      # ── Créer une Pull Request ──────────────────────────────────────────────
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: ${{ steps.find-book.outputs.slug }}
          BASE_BRANCH: ${{ github.ref_name }}
        run: |
          PR_BRANCH="add-book/${SLUG}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Supprimer l'ancienne branche si elle existe (évite le rejet "workflow modified")
          git push origin --delete "$PR_BRANCH" 2>/dev/null || true
          git checkout -b "$PR_BRANCH"

          git add "data/${SLUG}/" "data/json/"
          git add "_source/processed/${SLUG}.docx" "_source/processed/${SLUG}.json" 2>/dev/null || true
          git rm --cached "_source/pending/${SLUG}.docx" "_source/pending/${SLUG}.json" 2>/dev/null || true

          git commit -m "feat: add book ${SLUG}"
          git push -f origin "$PR_BRANCH"

          gh pr create \
            --title "Nouveau livre : ${SLUG}" \
            --body "Nouveau livre ${SLUG} ajouté automatiquement. Vérifier la traduction et les annotations avant de merger." \
            --base "$BASE_BRANCH" \
            --head "$PR_BRANCH" \
          || echo "PR existe déjà"

      # ── Sauvegarde de la progression en cas d'échec ─────────────────────────
      - name: Save progress on failure
        if: failure()
        uses: actions/cache/save@v4
        with:
          path: scripts/tmp
          key: pipeline-${{ github.run_id }}-failed
