name: Add Book Pipeline

on:
  push:
    paths:
      - '_source/pending/*.pdf'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug du livre à traiter (ex: mon-livre)'
        required: true
      force:
        description: 'Force replace existing book (if already in app)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    # Timeout long pour les gros livres (6 heures max)
    timeout-minutes: 360

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Cache pour accélérer les relances ──────────────────────────────────
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Cache spaCy models
        uses: actions/cache@v4
        with:
          path: ~/.local/lib/python3.11/site-packages
          key: ${{ runner.os }}-spacy-models-v2

      - name: Cache pipeline progress
        uses: actions/cache@v4
        with:
          path: scripts/tmp
          key: pipeline-${{ steps.find-book.outputs.slug }}-${{ github.run_id }}
          restore-keys: |
            pipeline-${{ steps.find-book.outputs.slug }}-

      # ── Installation ───────────────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci

      - name: Install system tools
        run: sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: |
          pip install spacy
          python scripts/install-spacy-models.py

      # ── Détection du livre à traiter ───────────────────────────────────────
      - name: Find book to process
        id: find-book
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            SLUG="${{ github.event.inputs.slug }}"
          else
            # Chercher un PDF ajouté dans ce commit (--diff-filter=A = ajouts seulement)
            PDF=$(git diff-tree --no-commit-id -r --name-only --diff-filter=A HEAD -- '_source/pending/*.pdf' | head -1)
            # Fallback : prendre le premier PDF présent dans le dossier pending
            if [ -z "$PDF" ]; then
              PDF=$(ls _source/pending/*.pdf 2>/dev/null | head -1)
            fi
            SLUG=$(basename "$PDF" .pdf)
          fi
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "📚 Livre à traiter: $SLUG"

      - name: Validate config
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          node scripts/validate-config.js "_source/pending/${{ steps.find-book.outputs.slug }}.json" $FORCE_FLAG

      # ── Pipeline ───────────────────────────────────────────────────────────
      - name: Step 1 - Extract text from PDF
        run: |
          bash scripts/1-extract.sh \
            "_source/pending/${{ steps.find-book.outputs.slug }}.pdf" \
            "${{ steps.find-book.outputs.slug }}"

      - name: Step 2 - Split into paragraphs
        run: |
          LANGUE_SOURCE=$(node -e "const c=require('./_source/pending/${{ steps.find-book.outputs.slug }}.json'); console.log(c.langueSource)")
          node scripts/2-split.js "${{ steps.find-book.outputs.slug }}" "$LANGUE_SOURCE"

      - name: Step 3 - Translate (with auto-retry on rate limits)
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          LANGUE_SOURCE=$(node -e "const c=require('./_source/pending/${{ steps.find-book.outputs.slug }}.json'); console.log(c.langueSource)")
          LANGUE_CIBLE=$(node -e "const c=require('./_source/pending/${{ steps.find-book.outputs.slug }}.json'); console.log(c.langueCible)")
          node scripts/3-translate.js \
            "${{ steps.find-book.outputs.slug }}" \
            "$LANGUE_SOURCE" \
            "$LANGUE_CIBLE"

      - name: Step 4 - Grammatical annotation
        run: |
          LANGUE_SOURCE=$(node -e "const c=require('./_source/pending/${{ steps.find-book.outputs.slug }}.json'); console.log(c.langueSource)")
          LANGUE_CIBLE=$(node -e "const c=require('./_source/pending/${{ steps.find-book.outputs.slug }}.json'); console.log(c.langueCible)")
          python scripts/4-annotate.py \
            "${{ steps.find-book.outputs.slug }}" \
            "$LANGUE_SOURCE" \
            "$LANGUE_CIBLE"

      - name: Step 5 - Generate TypeScript files
        run: |
          node scripts/5-generate.js \
            "_source/pending/${{ steps.find-book.outputs.slug }}.json"

      # ── Déplacer le PDF dans processed/ ────────────────────────────────────
      - name: Move files to processed
        run: |
          mkdir -p _source/processed
          mv "_source/pending/${{ steps.find-book.outputs.slug }}.pdf" _source/processed/
          mv "_source/pending/${{ steps.find-book.outputs.slug }}.json" _source/processed/

      # ── Créer une Pull Request ──────────────────────────────────────────────
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: ${{ steps.find-book.outputs.slug }}
          BASE_BRANCH: ${{ github.ref_name }}
        run: |
          PR_BRANCH="add-book/${SLUG}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$PR_BRANCH"

          git add "data/${SLUG}/" data/bibliotheque.ts
          git add "_source/processed/${SLUG}.pdf" "_source/processed/${SLUG}.json" 2>/dev/null || true
          git rm --cached "_source/pending/${SLUG}.pdf" "_source/pending/${SLUG}.json" 2>/dev/null || true

          git commit -m "feat: add book ${SLUG}"
          git push -f origin "$PR_BRANCH"

          python3 -c "
import os
slug = os.environ['SLUG']
lines = [
    '## Nouveau livre ajoute automatiquement',
    '',
    '**Slug:** ' + slug,
    '',
    '### Avant de merger',
    '- [ ] Verifier la qualite de la traduction',
    '- [ ] Verifier les annotations grammaticales (S/V/C)',
    '- [ ] Tester avec npx expo start',
    '',
    '### Ce qui a ete genere',
    '- data/' + slug + '/',
    '- data/bibliotheque.ts',
]
with open('/tmp/pr-body.md', 'w') as f:
    f.write('\n'.join(lines))
"
          gh pr create \
            --title "Nouveau livre : ${SLUG}" \
            --body-file /tmp/pr-body.md \
            --base "$BASE_BRANCH" \
            --head "$PR_BRANCH" \
          || echo "PR existe deja"

      # ── Sauvegarde de la progression en cas d'échec ─────────────────────────
      - name: Save progress on failure
        if: failure()
        uses: actions/cache/save@v4
        with:
          path: scripts/tmp
          key: pipeline-${{ github.run_id }}-failed
